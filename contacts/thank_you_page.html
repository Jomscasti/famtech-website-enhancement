<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* CARD */
        .thankyou-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
        }

        /* ICON */
        .success-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
            display: block;
            margin: auto;
            position: relative;
            top: 0;
            left: 0;
        }

        /* TEXT */
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #0c2e4e;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
        }

        /* BUTTON */
        .home-btn {
            background: #0c2e4e;
            color: white;
            border: 2px solid #caa63a;
            padding: 10px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #caa63a;
            color: #0c2e4e;
        }

        /* OPTIONAL SMALL NOTE */
        .note {
            margin-top: 15px;
            font-size: 13px;
            color: #999;
        }
    </style>

</head>

<body>

    <div class="thankyou-card">

        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-envelope-check-fill" viewBox="0 0 16 16">
                <path
                    d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.026A2 2 0 0 0 2 14h6.256A4.5 4.5 0 0 1 8 12.5a4.49 4.49 0 0 1 1.606-3.446l-.367-.225L8 9.586zM16 4.697v4.974A4.5 4.5 0 0 0 12.5 8a4.5 4.5 0 0 0-1.965.45l-.338-.207z" />
                <path
                    d="M16 12.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0m-1.993-1.679a.5.5 0 0 0-.686.172l-1.17 1.95-.547-.547a.5.5 0 0 0-.708.708l.774.773a.75.75 0 0 0 1.174-.144l1.335-2.226a.5.5 0 0 0-.172-.686" />
            </svg>
        </div>

        <div class="title">Thank You!</div>

        <div class="subtitle">
            Your message has been successfully sent.<br>
            Our team will get back to you shortly.
        </div>

        <a href="task-7.html" class="home-btn">Go to Homepage</a>

        <div class="note">
            FAMTECH Innovative IT Solutions
        </div>

    </div>

</body>

</html>
