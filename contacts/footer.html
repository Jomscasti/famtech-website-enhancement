<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer — FAMTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; background: #f5f5f5; }

        /* ============================================================
           SITE FOOTER
        ============================================================ */
        .site-footer {
            background: linear-gradient(175deg, #0c2541 0%, #071626 100%);
            font-family: "Segoe UI", system-ui, sans-serif;
            padding: 44px 0 48px;
        }

        /* Tagline */
        .footer-tagline {
            font-size: 22px;
            font-weight: 700;
            color: #4a9fc4;
            margin: 0 0 36px;
            line-height: 1.3;
        }

        /* Map */
        .footer-map {
            width: 100%;
            height: 210px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .07);
        }

        .footer-map iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Company name */
        .footer-company-name {
            font-size: 14px;
            font-weight: 700;
            color: #caa63a;
            margin-bottom: 10px;
        }

        /* Address */
        .footer-address {
            font-size: 13.5px;
            line-height: 1.85;
            color: #c0d4e4;
            font-weight: 500;
            margin: 0;
        }

        /* Contact items */
        .footer-contact-item {
            display: flex;
            align-items: center;
            gap: 9px;
            color: #4a9fc4;
            font-size: 13.5px;
            text-decoration: none;
            margin-bottom: 12px;
            transition: color .2s;
        }

        .footer-contact-item:hover { color: #caa63a; }

        .footer-contact-item svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* Book button */
        .footer-book-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding: 9px 22px;
            background: #caa63a;
            color: #071626;
            font-size: 13px;
            font-weight: 700;
            border-radius: 7px;
            text-decoration: none;
            letter-spacing: .04em;
            transition: background .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 14px rgba(202, 166, 58, .25);
        }

        .footer-book-btn:hover {
            background: #dbb843;
            color: #071626;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(202, 166, 58, .35);
        }

        /* Social icons */
        .footer-social {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 18px;
        }

        .footer-social a {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform .15s, opacity .2s;
        }

        .footer-social a:hover { transform: translateY(-2px); opacity: .85; }

        .footer-social a svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        .footer-social a[data-brand="facebook"]  { border-color: #1877f2; color: #1877f2; }
        .footer-social a[data-brand="linkedin"]  { border-color: #0a66c2; color: #0a66c2; }
        .footer-social a[data-brand="instagram"] { border-color: #d6249f; color: #d6249f; }
        .footer-social a[data-brand="tiktok"]    { border-color: #69c9d0; color: #69c9d0; }
        .footer-social a[data-brand="x"]         { border-color: #aaa; color: #aaa; }
        .footer-social a[data-brand="youtube"]   { border-color: #ff0000; color: #ff0000; }

        /* Responsive */
        @media (max-width: 991px) {
            .footer-map { height: 190px; }
        }

        @media (max-width: 767px) {
            .footer-tagline { font-size: 18px; margin-bottom: 28px; }
            .footer-map { height: 170px; margin-bottom: 24px; }
        }
    </style>
</head>

    <script>
        // "Book an Appointment" — switch to Book Now tab if embedded in task-7.html
        const bookBtn = document.querySelector('.footer-book-btn');
        if (bookBtn) {
            bookBtn.addEventListener('click', function (e) {
                const bookTab = document.querySelector('.tab[data-target="#book-now"]');
                if (bookTab) {
                    e.preventDefault();
                    bookTab.click();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        }
    </script>
