<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edge-to-Edge Partner Promo</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        /* ================= EDGE-TO-EDGE PARTNER PROMO ================= */
        .edge-promo-section {
            background: linear-gradient(180deg, #031426 0%, #062647 100%);
            padding: 120px 0 0 0;
            /* Zero bottom padding so the marquee sits flush */
            position: relative;
            overflow: hidden;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            /* A subtle gold bottom edge to transition to the next section */
            border-bottom: 2px solid rgba(255, 192, 5, 0.5);
        }

        /* Massive ambient glow to create spatial depth */
        .edge-promo-section::before {
            content: "";
            position: absolute;
            width: 150vw;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at 50% 120%, rgba(255, 192, 5, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Abstract data grid texture blended into the background */
        .edge-promo-section::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072');
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 0;
        }

        .edge-content {
            text-align: center;
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding: 0 20px 80px;
        }

        .edge-badge {
            background: transparent;
            color: #FFC005;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255, 192, 5, 0.4);
        }

        .edge-title {
            color: white;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: -1.5px;
        }

        .edge-text {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.7;
            margin-bottom: 45px;
            font-weight: 300;
        }

        .btn-edge {
            background: #FFC005;
            color: #062647;
            border-radius: 40px;
            font-weight: 700;
            padding: 18px 45px;
            font-size: 1.1rem;
            border: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .btn-edge:hover {
            background: #e6ac00;
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 192, 5, 0.25);
            color: #062647;
        }

        .btn-edge i {
            transition: transform 0.3s ease;
        }

        .btn-edge:hover i {
            transform: translateX(8px);
        }

        /* ================= EDGE-TO-EDGE LOGO MARQUEE ================= */
        .edge-marquee-wrapper {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 0;
            position: relative;
            z-index: 2;
            display: flex;
            overflow: hidden;
        }

        /* Gradient fades on the left and right to make logos "appear" out of the dark */
        .edge-marquee-wrapper::before,
        .edge-marquee-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            width: 15vw;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .edge-marquee-wrapper::before {
            left: 0;
            background: linear-gradient(to right, #062647, transparent);
        }

        .edge-marquee-wrapper::after {
            right: 0;
            background: linear-gradient(to left, #062647, transparent);
        }

        .edge-marquee-track {
            display: flex;
            align-items: center;
            gap: 100px;
            width: max-content;
            animation: edgeScroll 40s linear infinite;
            will-change: transform;
        }

        @keyframes edgeScroll {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        .edge-logo {
            flex: 0 0 auto;
            width: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .edge-logo img {
            max-width: 100%;
            max-height: 50px;
            object-fit: contain;
            filter: brightness(0) invert(1) opacity(0.4);
            /* Makes all logos sleek, faint white */
            transition: all 0.4s ease;
        }

        .edge-logo img:hover {
            filter: brightness(0) invert(1) opacity(1);
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <section class="edge-promo-section">

        <div class="container">
            <div class="edge-content" data-aos="fade-up">

                <div class="edge-badge">
                    <i class="bi bi-globe-americas me-2"></i> Strategic Alliances
                </div>

                <h2 class="edge-title">The Silent Engine Behind Global Leaders.</h2>

                <p class="edge-text">
                    We don't compete for the spotlight. FAMTECH provides the robust, invisible architecture that
                    empowers our partners to innovate securely, scale rapidly, and dominate their respective markets.
                </p>

                <a href="partners.html" class="btn-edge">
                    Discover Our Ecosystem
                    <i class="bi bi-arrow-right ms-2 fs-5"></i>
                </a>

            </div>
        </div>

        <div class="edge-marquee-wrapper" data-aos="fade-in" data-aos-delay="200">
            <div class="edge-marquee-track">
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
                        alt="Microsoft"></div>
                <div class="edge-logo"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
                </div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/4/48/Dell_Logo.svg"
                        alt="Dell"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/HP_logo_2012.svg"
                        alt="HP"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg"
                        alt="IBM"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg"
                        alt="IBM"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
                        alt="Microsoft"></div>
                <div class="edge-logo"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
                </div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/4/48/Dell_Logo.svg"
                        alt="Dell"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/HP_logo_2012.svg"
                        alt="HP"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg"
                        alt="IBM"></div>
                <div class="edge-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/IBM_logo.svg"
                        alt="IBM"></div>
            </div>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // Initialize Scroll Animations
        AOS.init({
            duration: 800,
            once: true,
            offset: 50,
            easing: 'ease-out-cubic'
        });
    </script>

</body>

</html>
