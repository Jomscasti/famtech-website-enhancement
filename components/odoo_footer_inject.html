<!--
  FAMTECH Custom Footer — Odoo Code Injection
  =============================================
  Paste this entire block into:
    Odoo > Website > Configuration > Settings > Custom Code > <head>
  OR into your custom module's template (AFTER the navbar inject block).

  This CSS targets the EXISTING Odoo footer selectors (footer#bottom,
  #footer, .o_footer, .o_footer_copyright, etc.) and reskins them to
  match the FAMTECH dark navy + gold design. The JS injects the brand
  strip, Quick Links, and Services columns that don't exist in the
  default Odoo footer. Every CSS declaration uses !important to
  override Odoo's default / color-combination styles.
-->

<style id="famtech-footer-inject">

/* ==============================================================
   BASE FOOTER — footer#bottom
============================================================== */
footer#bottom,
footer#bottom.o_footer,
footer#bottom.o_cc {
    background: #042a4b !important;
    color: #96b0c6 !important;
    font-family: "Segoe UI", system-ui, sans-serif !important;
    border: none !important;
}

/* Override Odoo color combination CSS variables */
footer#bottom.o_cc {
    --o-cc-bg: transparent !important;
    --o-cc-text: #96b0c6 !important;
    --o-cc-headings: #fff !important;
    --o-cc-link: #6a8aa2 !important;
    --o-cc-btn-primary: #caa63a !important;
}

footer#bottom .o_colored_level {
    background: transparent !important;
}

/* ==============================================================
   BRAND STRIP  (injected by JS — #famtechFooterBrand)
============================================================== */
#famtechFooterBrand {
    padding: 52px 0 40px !important;
    border-bottom: 1px solid rgba(202, 166, 58, .12) !important;
}

#famtechFooterBrand .famtech-fb-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
}

#famtechFooterBrand .famtech-fb-icon {

    height: 46px;
    flex-shrink: 0;
}

#famtechFooterBrand .famtech-fb-name {

    font-weight: 800;
    color: #fff;
    letter-spacing: .06em;
    line-height: 1;
    margin-bottom: 5px;
}

#famtechFooterBrand .famtech-fb-name span { color: #caa63a; }

#famtechFooterBrand .famtech-fb-sub {
    font-size: 10px;
    font-weight: 400;
    color: #caa63a;
    letter-spacing: .14em;
    text-transform: uppercase;
}

#famtechFooterBrand .famtech-fb-tagline {
    font-size: 13px;
    color: #5c7a93;
    margin: 0;
    line-height: 1.65;
    max-width: 360px;
}

/* Aurora text effect on tagline — background-clip:text approach */
#famtechFooterBrand .famtech-aurora-text {
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    margin: 0;
    line-height: 1.55;
    max-width: 420px;
    padding: 6px 4px;
    background:
        radial-gradient(ellipse at 20% 50%, #caa63a, transparent 50%),
        radial-gradient(ellipse at 80% 30%, #4a90b8, transparent 50%),
        radial-gradient(ellipse at 50% 80%, #e8c94a, transparent 45%),
        radial-gradient(ellipse at 70% 60%, #2a7ab5, transparent 50%),
        linear-gradient(135deg, #caa63a 0%, #4a90b8 40%, #e8c94a 70%, #2a7ab5 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: famtech-aurora-shift 8s ease-in-out infinite alternate;
}

@keyframes famtech-aurora-shift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 50% 0%; }
    50%  { background-position: 100% 50%; }
    75%  { background-position: 50% 100%; }
    100% { background-position: 0% 50%; }
}

@media (max-width: 991px) {

@media (max-width: 767px) {

============================================================== */

}

#famtechFooterMain .famtech-company-name {

}

#famtechFooterMain .famtech-address {

}

#famtechFooterMain .famtech-links a {

    color: #6a8aa2;
    text-decoration: none;

    align-items: center;
    gap: 8px;

}

#famtechFooterMain .famtech-links a::before {
    content: "";
    display: block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(202, 166, 58, .35);
    flex-shrink: 0;
    transition: background .2s, transform .2s;
}

#famtechFooterMain .famtech-links a:hover {
    color: #caa63a !important;
    padding-left: 3px;
}

#famtechFooterMain .famtech-links a:hover::before {
    background: #caa63a;
    transform: scale(1.4);
}

#famtechFooterMain .famtech-icon-wrap {

}

#famtechFooterMain .famtech-contact-item:hover .famtech-icon-wrap {

#famtechFooterMain .famtech-icon-wrap svg {
    width: 14px;
    height: 14px;
    stroke: #caa63a;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Book button */
#famtechFooterMain .famtech-book-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 10px 22px;

    font-size: 13px;
    font-weight: 700;
    border-radius: 7px;
    text-decoration: none;

#famtechFooterMain .famtech-book-btn svg {
    width: 14px;
    height: 14px;

    fill: none;

@media (max-width: 991px) {

@media (max-width: 767px) {

/* ==============================================================
   HIDE THE ORIGINAL ODOO FOOTER CONTENT
   We replace it entirely with the injected sections above,
   plus a restyled map and bottom bar.
============================================================== */
footer#bottom #footer {
    display: none !important;

/* ==============================================================
   MAP SECTION  (injected by JS — #famtechFooterMap)
============================================================== */
#famtechFooterMap {
    width: 100% !important;
    height: 230px !important;
    position: relative !important;
    overflow: hidden !important;
}

/* Gradient fade at top blends into the footer background */
#famtechFooterMap::before {
    content: "" !important;
    position: absolute !important;
    top: 0 !important; left: 0 !important; right: 0 !important;
    height: 48px !important;
    background: linear-gradient(to bottom, #042a4b, transparent) !important;
    z-index: 1 !important;
    pointer-events: none !important;
}

#famtechFooterMap iframe {
    width: 100% !important;
    height: 100% !important;
    border: none !important;
    display: block !important;
    filter: saturate(.6) brightness(.78) hue-rotate(185deg) !important;
}

@media (max-width: 767px) {

============================================================== */
footer#bottom .o_footer_copyright {
    display: none !important;
