<!--
  FAMTECH — Combined Odoo Code Injection
  =======================================
  Paste this ENTIRE block into:
    Odoo > Website > Configuration > Settings > Custom Code > <head>

  Contains (in order):
    1. Navbar  — reskins header#top to FAMTECH dark navy + gold
    2. Footer  — reskins footer#bottom and injects brand strip,
                 4-col grid, map, and bottom bar
    3. Appt    — reskins the appointment-scheduled confirmation page
                 (only activates on pages with .o_appointment_validation_details)
-->

<!-- ============================================================
     1. NAVBAR
     ============================================================ -->
<style id="famtech-navbar-inject">
    /* ==============================================================
   FONT FAMILY
   Only target text-bearing elements — never <i> icon tags.
   This avoids breaking FontAwesome (.fa) and Odoo Icon (.oi)
   glyphs which rely on their own @font-face families.
============================================================== */
    header#top,
    header#top a,
    header#top span:not(.oi):not(.fa):not([class*="fa-"]):not([class*="oi-"]),
    header#top button,
    header#top input,
    header#top p,
    header#top div,
    header#top li,
    header#top ul,
    header#top nav,
    header#top small,
    header#top label {
        font-family: "Segoe UI", sans-serif !important;
    }

    /* Never let our font override leak into <i> icon elements.
   Restore every possible icon font family name Odoo may use.  */
    header#top i {
        font-family: inherit !important;
    }

    header#top i.fa,
    header#top i[class*="fa-"],
    header#top .fa {
        font-family: "Font Awesome 5 Free", "Font Awesome 5 Brands", "FontAwesome" !important;
    }

    header#top i.oi,
    header#top i[class*="oi-"],
    header#top .oi {
        font-family: "odoo_icon", "Odoo", "bootstrap-icons" !important;
    }

    /* .fa-stack sizing resets — oi-search gets fa-stack from Odoo
   which forces width/height to 2em; reset so it fits the button */
    header#top i.fa-stack,
    header#top i.oi.fa-stack {
        width: auto !important;
        height: auto !important;
        line-height: inherit !important;
        vertical-align: middle !important;
    }

    /* ==============================================================
   DESKTOP NAV — the <nav> visible at ≥ 992 px (d-lg-block)
============================================================== */
    header#top {
        background: #042a4b !important;
        border: none !important;
    }

    header#top>nav.navbar.d-none.d-lg-block {
        background: #042a4b !important;
        padding: 0 24px !important;
        height: 64px !important;
        min-height: 64px !important;
        max-height: 64px !important;
        position: sticky !important;
        top: 0 !important;
        z-index: 1100 !important;
        box-shadow: 0 2px 12px rgba(0, 0, 0, .35) !important;
        border: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
    }

    /* Override Odoo color combination CSS variables */
    header#top>nav.navbar.o_cc {
        --o-cc-bg: #042a4b !important;
        --o-cc-text: #d4dce8 !important;
        --o-cc-headings: #fff !important;
        --o-cc-link: #d4dce8 !important;
        --o-cc-btn-primary: #caa63a !important;
    }

    /* ==============================================================
   INNER CONTAINER — #o_main_nav > .container
============================================================== */
    header#top #o_main_nav {
        height: 64px !important;
        min-height: 64px !important;
        background: transparent !important;
    }

    header#top #o_main_nav>.container {
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        height: 64px !important;
        max-width: 100% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
    }

    /* ==============================================================
   HIDE THE BOTTOM BAR (o_header_sales_one_bot)
============================================================== */
    header#top .o_header_sales_one_bot {
        display: none !important;
    }

    /* ==============================================================
   LOGO / BRAND
============================================================== */
    header#top .navbar-brand.logo {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
        text-decoration: none !important;
        flex-shrink: 0 !important;
        padding: 0 !important;
        margin-right: 20px !important;
    }

    header#top .navbar-brand.logo img {
        width: auto !important;
        height: 40px !important;
        object-fit: contain !important;
        filter: brightness(1.1) !important;
    }

    /* ==============================================================
   NAV LINKS  — #top_menu
   The main desktop menu list.
============================================================== */
    header#top #top_menu.top_menu {
        display: flex !important;
        align-items: center !important;
        list-style: none !important;
        margin: 0 !important;
        padding: 0 !important;
        gap: 2px !important;
        flex-grow: 1 !important;
        justify-content: flex-start !important;
    }

    header#top #top_menu>li.nav-item {
        position: relative !important;
    }

    /* Mega-menu parent needs position:static so the panel spans full width */
    header#top #top_menu>li.nav-item.dropdown.position-static {
        position: static !important;
    }

    /* --- Regular nav links --- */
    header#top #top_menu>li.nav-item>a.nav-link {
        display: flex !important;
        align-items: center !important;
        gap: 3px !important;
        color: #d4dce8 !important;
        font-size: 13.5px !important;
        font-weight: 500 !important;
        text-decoration: none !important;
        padding: 0 11px !important;
        height: 64px !important;
        line-height: 64px !important;
        background: none !important;
        border: none !important;
        cursor: pointer !important;
        white-space: nowrap !important;
        transition: color .2s, background .2s !important;
    }

    /* Spans inside nav links inherit colour */
    header#top #top_menu>li.nav-item>a.nav-link span {
        color: inherit !important;
    }

    /* Hover & active states */
    header#top #top_menu>li.nav-item>a.nav-link:hover,
    header#top #top_menu>li.nav-item>a.nav-link:focus,
    header#top #top_menu>li.nav-item>a.nav-link.active {
        color: #caa63a !important;
        background: rgba(202, 166, 58, .08) !important;
    }

    /* --- Dropdown toggle (Solutions, or any mega-menu trigger) --- */
    header#top #top_menu>li.nav-item.dropdown>a.dropdown-toggle {
        display: flex !important;
        align-items: center !important;
        gap: 3px !important;
        color: #d4dce8 !important;
        font-size: 13.5px !important;
        font-weight: 500 !important;
        text-decoration: none !important;
        padding: 0 11px !important;
        height: 64px !important;
        line-height: 64px !important;
        background: none !important;
        border: none !important;
        cursor: pointer !important;
        white-space: nowrap !important;
        transition: color .2s, background .2s !important;
    }

    header#top #top_menu>li.nav-item.dropdown>a.dropdown-toggle span {
        color: inherit !important;
    }

    header#top #top_menu>li.nav-item.dropdown>a.dropdown-toggle:hover,
    header#top #top_menu>li.nav-item.dropdown>a.dropdown-toggle:focus,
    header#top #top_menu>li.nav-item.dropdown.show>a.dropdown-toggle {
        color: #caa63a !important;
        background: rgba(202, 166, 58, .08) !important;
    }

    /* Bootstrap caret arrow colour */
    header#top #top_menu>li.nav-item.dropdown>a.dropdown-toggle::after {
        border-top-color: currentColor !important;
        margin-left: 4px !important;
        transition: transform .2s !important;
    }

    header#top #top_menu>li.nav-item.dropdown:hover>a.dropdown-toggle::after,
    header#top #top_menu>li.nav-item.dropdown.show>a.dropdown-toggle::after {
        transform: rotate(180deg) !important;
    }

    /* ==============================================================
   MEGA-MENU PANEL  — .dropdown-menu.o_mega_menu
   The full-width drop-down used by Solutions.
============================================================== */
    header#top .dropdown-menu.o_mega_menu {
        background: #0b1e33 !important;
        border: none !important;
        border-top: 2px solid #caa63a !important;
        border-radius: 0 !important;
        box-shadow: 0 16px 40px rgba(0, 0, 0, .5) !important;
        padding: 28px 0 32px !important;
        margin-top: 0 !important;
        width: 100% !important;
        left: 0 !important;
        right: 0 !important;
        animation: famtechMegaSlide .22s ease forwards !important;
    }

    @keyframes famtechMegaSlide {
        from {
            opacity: 0;
            transform: translateY(-8px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ==============================================================
   PRODUCTS MEGA-MENU — text-column layout
   Only applied when the JS stamps .famtech-products-mega
   onto the Products <li>. Services mega menu is unaffected.
============================================================== */

    /* --- Section wrapper --- */
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_odoo_extra,

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_odoo_extra.o_cc,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_odoo_extra.o_cc1,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_cards.o_cc,

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_cards>.container {

    /* --- Column row layout --- */

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu .s_mega_menu_cards .row {

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu h5,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu h6,

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu [class*="fw-bolder"]:not(a):not(button) {

        font-size: 11px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.09em !important;
        display: block !important;
        padding-bottom: 10px !important;
        margin-bottom: 12px !important;
        border-bottom: 1px solid rgba(202, 166, 58, .35) !important;
        line-height: 1.4 !important;
    }

    /* --- Item links --- */
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu a.nav-link,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu ul li a,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu p a {
        display: block !important;
        color: #7a9fbe !important;
        font-size: 13px !important;
        font-weight: 400 !important;
        text-decoration: none !important;
        padding: 4px 0 !important;
        height: auto !important;
        line-height: 1.7 !important;
        background: transparent !important;
        border: none !important;
        border-radius: 0 !important;
        white-space: normal !important;
        transition: color .15s !important;
        transform: none !important;
        box-shadow: none !important;
        overflow: visible !important;
        flex-direction: unset !important;

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu a.nav-link:hover,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu ul li a:hover,
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu p a:hover {
        color: #caa63a !important;
        background: transparent !important;

    }

    /* Hide images inside Products mega menu */
    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu img {
        display: none !important;
    }

    /* Reset paragraph / list styling inside Products mega menu */

        margin: 0 !important;
        padding: 0 !important;
        background: transparent !important;

    }

    header#top li.famtech-products-mega .dropdown-menu.o_mega_menu ul {

    /* ==============================================================

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var header = document.getElementById('top');

        // ── Stamp mega-menu classes on Products and Services nav items ──
        if (header) {
            var navItems = header.querySelectorAll('#top_menu > li.nav-item');
            navItems.forEach(function (li) {
                var link = li.querySelector(':scope > a.nav-link, :scope > a.dropdown-toggle');
                if (!link) return;
                var label = link.textContent.trim().toLowerCase();
                if (label === 'products') {
                    li.classList.add('famtech-products-mega');
                } else if (label === 'services') {
                    li.classList.add('famtech-services-mega');
                }
            });
        }

        if (!header) return;

        // ── USER DROPDOWN: Click-to-toggle ──
        var userDropdownLi = header.querySelector('.o_header_sales_one_right_col .dropdown.o_no_autohide_item');
        if (userDropdownLi) {
            var userBtn = userDropdownLi.querySelector('a.dropdown-toggle');
            var userMenu = userDropdownLi.querySelector('.js_usermenu');
            var userMenuOpen = false;

            if (userBtn) {
                userBtn.removeAttribute('data-bs-toggle');
                userBtn.removeAttribute('data-bs-auto-close');
            }

            if (window.bootstrap && window.bootstrap.Dropdown && userBtn) {
                var bsInstance = window.bootstrap.Dropdown.getInstance(userBtn);
                if (bsInstance) bsInstance.dispose();
            }

            function showUserMenu() {
                userMenuOpen = true;
                if (userMenu) { userMenu.classList.add('show'); userMenu.style.display = 'block'; }
                if (userBtn) userBtn.setAttribute('aria-expanded', 'true');
            }

            function hideUserMenu() {
                userMenuOpen = false;
                if (userMenu) { userMenu.classList.remove('show'); userMenu.style.display = ''; }
                if (userBtn) userBtn.setAttribute('aria-expanded', 'false');
            }

            if (userBtn) {
                userBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    if (userMenuOpen) { hideUserMenu(); } else { showUserMenu(); }
                }, true);
            }

            document.addEventListener('click', function (e) {
                if (userMenuOpen && !userDropdownLi.contains(e.target)) hideUserMenu();
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && userMenuOpen) hideUserMenu();
            });

            setTimeout(function () {
                if (userBtn) {
                    userBtn.removeAttribute('data-bs-toggle');
                    userBtn.removeAttribute('data-bs-auto-close');
                }
                if (window.bootstrap && window.bootstrap.Dropdown && userBtn) {
                    var late = window.bootstrap.Dropdown.getInstance(userBtn);
                    if (late) late.dispose();
                }
            }, 2000);
        }

        // ── Kill Odoo's search modal ──
        var odooSearchModal = document.getElementById('o_search_modal');
        if (odooSearchModal) odooSearchModal.remove();

        var searchBtns = header.querySelectorAll('[data-bs-target="#o_search_modal"]');
        searchBtns.forEach(function (btn) {
            btn.removeAttribute('data-bs-toggle');
            btn.removeAttribute('data-bs-target');
        });

        // ── Custom search overlay ──
        var overlay = document.createElement('div');
        overlay.id = 'famtechSearchOverlay';
        overlay.setAttribute('role', 'search');
        overlay.innerHTML =
            '<span style="flex-shrink:0;color:#6a8eaa;display:flex;align-items:center">' +
            '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">' +
            '<circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>' +
            '</svg>' +
            '</span>' +
            '<input id="famtechSearchInput" type="search" placeholder="Search products, solutions, articles\u2026" ' +
            'autocomplete="off" style="flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;' +
            'padding:0 0 6px;border-bottom:1px solid rgba(255,255,255,.15);transition:border-color .2s;font-family:Segoe UI,sans-serif"/>' +
            '<button id="famtechSearchClose" aria-label="Close search" style="flex-shrink:0;width:32px;height:32px;' +
            'border-radius:50%;border:none;background:rgba(255,255,255,.06);color:#6a8eaa;display:flex;' +
            'align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s">' +
            '<svg viewBox="0 0 14 14" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round">' +
            '<line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/>' +
            '</svg>' +
            '</button>';

        overlay.style.cssText =
            'position:absolute;top:64px;left:0;right:0;background:#0b1e33;border-top:2px solid #caa63a;' +
            'padding:18px 40px;display:flex;align-items:center;gap:12px;box-shadow:0 16px 40px rgba(0,0,0,.5);' +
            'z-index:1200;opacity:0;pointer-events:none;transform:translateY(-8px);' +
            'transition:opacity .22s ease,transform .22s ease;';

        var desktopNav = header.querySelector('nav.d-none.d-lg-block');
        if (desktopNav) {
            desktopNav.style.position = 'relative';
            desktopNav.appendChild(overlay);
        }

        searchBtns.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                openFamtechSearch();
            }, true);
        });

        var searchInput = document.getElementById('famtechSearchInput');
        var searchClose = document.getElementById('famtechSearchClose');

        function openFamtechSearch() {
            document.querySelectorAll('.modal-backdrop').forEach(function (el) { el.remove(); });
            document.body.classList.remove('modal-open');
            document.body.style.removeProperty('overflow');
            document.body.style.removeProperty('padding-right');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'auto';
            overlay.style.transform = 'translateY(0)';
            setTimeout(function () { searchInput.focus(); }, 80);
        }

        function closeFamtechSearch() {
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            overlay.style.transform = 'translateY(-8px)';
            searchInput.value = '';
        }

        if (searchClose) searchClose.addEventListener('click', closeFamtechSearch);

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeFamtechSearch();
        });

        document.addEventListener('click', function (e) {
            if (overlay.style.opacity === '1' && !overlay.contains(e.target) &&
                !e.target.closest('[data-bs-target="#o_search_modal"], .oi-search')) {
                closeFamtechSearch();
            }
        });

        if (searchInput) {
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && searchInput.value.trim()) {
                    window.location.href = '/website/search?search=' + encodeURIComponent(searchInput.value.trim());
                }
            });
            searchInput.addEventListener('focus', function () { searchInput.style.borderBottomColor = '#caa63a'; });
            searchInput.addEventListener('blur', function () { searchInput.style.borderBottomColor = 'rgba(255,255,255,.15)'; });
        }

        if (searchClose) {
            searchClose.addEventListener('mouseenter', function () { searchClose.style.background = 'rgba(202,166,58,.15)'; searchClose.style.color = '#caa63a'; });
            searchClose.addEventListener('mouseleave', function () { searchClose.style.background = 'rgba(255,255,255,.06)'; searchClose.style.color = '#6a8eaa'; });
        }
    });
</script>

        .famtech-appt-card-body > .row.mb-4 .col-9,
        .famtech-appt-card-body > .row.mb-4 .col-9.col-lg-6 { flex: 0 0 100% !important; max-width: 100% !important; }
        .famtech-appt-card-body > .row.mb-4 .col-3 .text-muted {

    /* ENTRANCE ANIMATIONS */
    @keyframes famtech-fade-up {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes famtech-icon-pop {
        from { opacity: 0; transform: scale(0.4); }
        to   { opacity: 1; transform: scale(1); }
    }

    .famtech-success-icon { animation: famtech-icon-pop 0.45s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both !important; }

    #wrap.famtech-appt-confirmed .oe_structure.container > h2 { animation: famtech-fade-up 0.4s 0.2s ease both !important; }
    .famtech-thank-you  { animation: famtech-fade-up 0.4s 0.28s ease both !important; }
    .famtech-appt-card  { animation: famtech-fade-up 0.4s 0.35s ease both !important; }
    .famtech-cancel-row { animation: famtech-fade-up 0.4s 0.42s ease both !important; }
    .famtech-confirmation-box { animation: famtech-fade-up 0.4s 0.5s ease both !important; }

</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    // GUARD — only run on the appointment-scheduled confirmation page
    var validationDetails = document.querySelector('.o_appointment_validation_details');
    if (!validationDetails) return;

    var wrap = document.querySelector('#wrap.o_appointment');
    if (!wrap) return;

    wrap.classList.add('famtech-appt-confirmed');

    var container = wrap.querySelector('.ee_structure.container') || wrap.querySelector('.oe_structure.container');
    if (!container) return;

    var h2 = container.querySelector(':scope > h2');
    var h4 = container.querySelector(':scope > h4');

    // 1. INJECT SUCCESS ICON
    if (h2) {
        var successIcon = document.createElement('div');
        successIcon.className = 'famtech-success-icon';
        successIcon.innerHTML =
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">' +
            '<path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0' +
            'l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/>' +
            '</svg>';
        h2.parentNode.insertBefore(successIcon, h2);
    }

    // 2. INJECT "Thank you" text
    var thankYou = document.createElement('p');
    thankYou.className = 'famtech-thank-you';
    thankYou.textContent = 'Thank you for scheduling this meeting. We hope to see you there.';

    var emptyStructure = h4 ? h4.nextElementSibling : null;
    if (emptyStructure && emptyStructure.classList.contains('oe_structure') && emptyStructure.children.length === 0) {
        emptyStructure.parentNode.insertBefore(thankYou, emptyStructure.nextSibling);
    } else if (h4) {
        h4.parentNode.insertBefore(thankYou, h4.nextSibling);
    }

    // 3. CREATE CARD WRAPPER
    var leftCol = validationDetails.querySelector(':scope > .col-12:first-child');
    if (leftCol) {
        var card = document.createElement('div');
        card.className = 'famtech-appt-card shadow-sm';

        var header = document.createElement('div');
        header.className = 'famtech-appt-card-header';
        var fwNormal = h4 ? h4.querySelector('.fw-normal') : null;
        header.textContent = fwNormal ? fwNormal.textContent.trim() : (h4 ? h4.textContent.trim() : 'Appointment Details');
        card.appendChild(header);

        if (h4) h4.style.display = 'none';

        var body = document.createElement('div');
        body.className = 'famtech-appt-card-body';

        var rows = leftCol.querySelectorAll(':scope > .row.mb-4');
        var detailRows = [];
        var cancelRow = null;

        for (var i = 0; i < rows.length; i++) {
            if (rows[i].querySelector('.o_appointment_cancel_link')) {
                cancelRow = rows[i];
            } else {
                detailRows.push(rows[i]);
            }
        }

        detailRows.forEach(function (row) { body.appendChild(row); });
        card.appendChild(body);
        leftCol.insertBefore(card, leftCol.firstChild);

        if (cancelRow) cancelRow.classList.add('famtech-cancel-row');

        // 4. STYLE CONFIRMATION BOX
        var confirmDiv = leftCol.querySelector(':scope > div:not(.row):not(.famtech-appt-card)');
        if (confirmDiv && confirmDiv.querySelector('.fw-normal')) {
            confirmDiv.classList.add('famtech-confirmation-box', 'shadow');
        }
    }

    // 5. CHECK 24-HOUR CANCEL RESTRICTION
    var eventStart = validationDetails.getAttribute('data-event-start');
    if (eventStart) {
        var parts = eventStart.split(' ');
        var dateParts = parts[0].split('-').map(Number);
        var timeParts = parts[1].split(':').map(Number);

        var apptStartUTC = new Date(Date.UTC(
            dateParts[0], dateParts[1] - 1, dateParts[2],
            timeParts[0], timeParts[1], timeParts[2] || 0
        ));

        var now = new Date();
        var hoursUntilAppt = (apptStartUTC - now) / (1000 * 60 * 60);

        if (hoursUntilAppt < 24) {
            var cancelLink = document.querySelector('.o_appointment_cancel_link');
            if (cancelLink) {
                cancelLink.classList.add('famtech-disabled');
                cancelLink.removeAttribute('href');

                var cancelParent = cancelLink.closest('.row.mb-4') ||
                                   cancelLink.closest('.famtech-cancel-row') ||
                                   cancelLink.parentNode;
                if (cancelParent) {
                    var note = document.createElement('div');
                    note.className = 'famtech-cancel-note visible';
                    note.innerHTML =
                        'Oops! Your appointment is scheduled in less than ' +
                        '<strong>24 hour(s)</strong> and cannot be cancelled at this time.<br>' +
                        'To make any changes, please contact ' +
                        '<strong>FAMTECH INNOVATIVE</strong> at ' +
                        '<a href="mailto:rodrigo.caliste@famtech-innovative.com">' +
                        'rodrigo.caliste@famtech-innovative.com</a>' +
                        ' or <strong>09686140597</strong>.';
                    cancelParent.parentNode.insertBefore(note, cancelParent.nextSibling);
                }
            }
        }
    }

    // 6. REDIRECT CANCEL TO BOOK NOW TAB
    var cancelLinkEl = document.querySelector('.o_appointment_cancel_link');
    if (cancelLinkEl && !cancelLinkEl.classList.contains('famtech-disabled')) {
        cancelLinkEl.addEventListener('click', function (e) {
            e.preventDefault();
            var cancelUrl = cancelLinkEl.getAttribute('href');
            if (!cancelUrl) return;

            fetch(cancelUrl, { method: 'GET', credentials: 'same-origin' })
                .finally(function () {
                    window.location.href = '/contact?cancelled=1#book-now';
                });
        });
    }
});
</script>
